spring:
  application:
    name: portfolio-manager

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false  
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    br.com.codegroup: INFO